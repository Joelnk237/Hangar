# ─────────────────────────────────────────────────────────────
# sonar-project.properties — Frontend Next.js
# Utilisé par : npx sonar-scanner
# ─────────────────────────────────────────────────────────────

sonar.projectKey=mon-projet-frontend
sonar.projectName=Mon Projet - Frontend
sonar.projectVersion=1.0

# Sources JavaScript/TypeScript
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.sourceEncoding=UTF-8

# Rapport de couverture Jest (généré par npm test -- --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=\
    node_modules/**,\
    .next/**,\
    coverage/**,\
    **/*.d.ts,\
    **/jest.config.*,\
    **/next.config.*