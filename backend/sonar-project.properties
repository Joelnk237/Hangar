# ─────────────────────────────────────────────────────────────
# sonar-project.properties — Backend Vert.x 5
# Ce fichier est lu par la commande : mvn sonar:sonar
# ─────────────────────────────────────────────────────────────

# Identifiant unique du projet dans SonarQube
sonar.projectKey=mon-projet-backend
sonar.projectName=Mon Projet - Backend
sonar.projectVersion=1.0

# Répertoire source Java
sonar.sources=src/main/java
sonar.tests=src/test/java

# Encodage
sonar.sourceEncoding=UTF-8

# Rapport de couverture JaCoCo (généré par mvn test)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusions (ne pas analyser les fichiers générés)
sonar.exclusions=\
    **/generated-sources/**,\
    **/target/**,\
    **/*Test.java,\
    **/*IT.java

# Seuils de qualité recommandés pour un CV (Quality Gate)
# Ces règles sont configurées dans l'interface SonarQube :
# - Couverture de tests > 70%
# - Duplications < 3%
# - Aucun bug bloquant
# - Aucune faille de sécurité critique
